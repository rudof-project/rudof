schema_root = "."

# Cases vendored from shexSpec/shexTest (validation/manifest.jsonld).
# Each case has: <id>/schema.shex, <id>/data.ttl, <id>/shapemap.sm.
# The shapemap is the compact-format equivalent of the manifest's
# (focus, shape) pair (or list of pairs).

[[case]]
id       = "1dot"
schema   = "1dot/schema.shex"
data     = "1dot/data.ttl"
shapemap = "1dot/shapemap.sm"
size     = "small"

