# Examples manifest for pyrudof documentation and testing.
#
# This is the single source of truth for which examples are documented and tested.
# Both `python/docs/generate_examples_doc.py` and `python/tests/test_examples.py`
# read from this file.
#
# To add a new documented example:
#   1. Create a `.py` file in python/examples/
#   2. Add an [[example]] entry below
#   3. Run: python docs/generate_examples_doc.py --update
#   4. Tests are picked up automatically

# ===========================================================================
# Category descriptions (used to generate section headers in examples.rst)
# ===========================================================================

[categories.shex]
title = "ShEx Validation"
description = """ShEx (Shape Expressions) is a language for describing and validating RDF data structures.
These examples show how to use pyrudof for ShEx validation tasks."""

[categories.shacl]
title = "SHACL Validation"
description = """SHACL (Shapes Constraint Language) is a W3C standard for validating RDF graphs.
These examples demonstrate SHACL validation with pyrudof."""

[categories.rdf]
title = "RDF Data Handling"
description = """These examples show how to parse, manipulate, and serialize RDF data using pyrudof."""

[categories.dctap]
title = "DCTAP Conversion"
description = """DCTAP (Dublin Core Tabular Application Profiles) is a simple tabular format for
describing data models. These examples show how to convert DCTAP profiles to ShEx schemas."""

[categories.sparql]
title = "SPARQL Queries"
description = """SPARQL is the standard query language for RDF. These examples demonstrate
how to execute SPARQL queries using pyrudof."""

[categories.generate]
title = "Data Generation"
description = """These examples show how to configure and use rudof_generate to create
synthetic RDF data from ShEx or SHACL schemas."""

[categories.endpoint]
title = "Endpoints & Service Descriptions"
description = """These examples demonstrate how to interact with remote SPARQL endpoints,
retrieve service descriptions, and query node information.
They require network access and are not executed during automated testing."""

[categories.uml]
title = "UML Visualization"
description = """These examples show how to convert RDF data, ShEx schemas, and DCTAP
profiles into PlantUML diagrams for visualization.
They require plantuml jar and are not executed during automated testing."""

[categories.utility]
title = "Utility & Introspection"
description = """Miscellaneous utilities: inspecting the pyrudof module, listing available
classes, and writing unit tests against pyrudof."""

# ===========================================================================
# Category order (controls the order in which sections appear in the docs)
# ===========================================================================

[category_order]
order = ["shex", "shacl", "rdf", "dctap", "sparql", "endpoint", "generate", "uml", "utility"]

