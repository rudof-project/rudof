# Examples manifest for pyrudof documentation and testing.
#
# This file is the single source of truth for documented examples.
# Both python/docs/generate_examples_doc.py and python/tests/test_examples.py
# read from this file.

[categories.shex]
title = "ShEx Validation"
description = """Examples for reading ShEx schemas, validating data, and serializing schemas/ShapeMaps."""

[categories.shacl]
title = "SHACL Validation"
description = """Examples for SHACL loading, validation, extraction from data, and serialization."""

[categories.rdf]
title = "RDF Data Handling"
description = """Examples for RDF loading, serialization, and node inspection."""

[categories.dctap]
title = "DCTAP"
description = """Examples for reading DCTAP profiles from inline content or files."""

[categories.sparql]
title = "SPARQL Queries"
description = """Examples for SELECT, CONSTRUCT and ASK query workflows."""

[categories.endpoint]
title = "Service Description"
description = """Examples for service description parsing and serialization."""

[categories.generate]
title = "Data Generation"
description = """Examples for GeneratorConfig and DataGenerator APIs."""

[categories.utility]
title = "Utility & Introspection"
description = """Examples for config loading, resets, versioning, and module introspection."""

[category_order]
order = ["shex", "shacl", "rdf", "dctap", "sparql", "endpoint", "generate", "utility"]

[[example]]
key = "shex_validate_inline"
source_file = "shex_validate_inline.py"
title = "ShEx Validate Inline"
description = "Validate inline RDF data against an inline ShEx schema and ShapeMap"
category = "shex"
files = {}
expected_output = ["SHEX_INLINE_VALIDATION_OK"]

[[example]]
key = "shex_validate_file"
source_file = "shex_validate_file.py"
title = "ShEx Validate Files"
description = "Validate RDF data from files against a ShEx schema and ShapeMap"
category = "shex"
