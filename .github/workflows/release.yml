name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version component to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Bump version and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Compute new version
        id: version
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) new="$((major + 1)).0.0" ;;
            minor) new="$major.$((minor + 1)).0" ;;
            patch) new="$major.$minor.$((patch + 1))" ;;
          esac
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
      - name: Update version in Cargo.toml
        run: |
          sed -i '0,/^version = ".*"/{s/^version = ".*"/version = "${{ steps.version.outputs.new }}"/}' Cargo.toml
      - name: Verify version was updated
        run: grep '^version = "${{ steps.version.outputs.new }}"' Cargo.toml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: release ${{ steps.version.outputs.new }} [skip ci]"
          git push
      - name: Create GitHub release
        run: gh release create "${{ steps.version.outputs.new }}" --title "${{ steps.version.outputs.new }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
