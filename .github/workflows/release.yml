name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version component to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Bump version and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Compute new version
        id: version
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) new="$((major + 1)).0.0" ;;
            minor) new="$major.$((minor + 1)).0" ;;
            patch) new="$major.$minor.$((patch + 1))" ;;
          esac
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
      - name: Update version in Cargo.toml
        run: |
          OLD="${{ steps.version.outputs.current }}"
          NEW="${{ steps.version.outputs.new }}"
          # Bump workspace version
          sed -i "0,/^version = \"${OLD}\"/{s/^version = \"${OLD}\"/version = \"${NEW}\"/}" Cargo.toml
          # Bump only internal workspace crates in [workspace.dependencies]
          INTERNAL_CRATES="dctap|mie|pgschema|prefixmap|pyrudof|rbe|rbe_testsuite|rdf_config|rudof_cli|rudof_iri|rudof_rdf|rudof_generate|rudof_lib|rudof_mcp|shacl|shapes_comparator|shapes_converter|shex_ast|shex_testsuite|shex_validation|sparql_service"
          sed -i -E "/^(${INTERNAL_CRATES}) = \{/{s/version = \"${OLD}\"/version = \"${NEW}\"/}" Cargo.toml
      - name: Verify version was updated
        run: grep '^version = "${{ steps.version.outputs.new }}"' Cargo.toml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: release ${{ steps.version.outputs.new }} [skip ci]"
          git push
      - name: Create GitHub release
        run: gh release create "${{ steps.version.outputs.new }}" --title "${{ steps.version.outputs.new }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
