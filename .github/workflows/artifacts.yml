name: Artifacts

on:
  release:
    types:
      - published

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Allow the workflow to access the files of the repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Use an intelligent Rust cache for building the project
        uses: Swatinem/rust-cache@v2
      - name: Build the release version of `rudof` for the x86 architecture
        run: cargo build --release
      - name: Upload the generated Artifact for it to be stored in its corresponding release (x86)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.BINARY_NAME }}_x86_64_linux_gnu
          path: target/release/${{ vars.BINARY_NAME }}
      - name: Rename the binary according to the version and architecture
        run: mv target/release/${{ vars.BINARY_NAME }} ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64_linux_gnu
      - name: Upload the generated binaries to their corresponding release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64_linux_gnu
      - name: Build rudof-mcp binary for x86_64 architecture
        run: cargo build --release -p rudof_mcp --bin rudof-mcp
      - name: Create rudof-mcp directory for MCPB compliance
        run: mkdir -p rudof-mcp
      - name: Copy and rename rudof-mcp binary
        run: cp target/release/rudof-mcp rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_linux_gnu
      - name: Generate SHA-256 hash for rudof-mcp binary
        run: sha256sum rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_linux_gnu > rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_linux_gnu.sha256
      - name: Upload rudof-mcp binary and hash to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_linux_gnu
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_linux_gnu.sha256

  mac:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: '/Applications/Xcode.app/Contents/Developer'
      SDKROOT: '/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk'
      MACOSX_DEPLOYMENT_TARGET: '10.14'
    steps:
      - name: Allow the workflow to access the files of the repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Use an intelligent Rust cache for building the project
        uses: Swatinem/rust-cache@v2
      - name: Build the release version of `rudof` for the x86 architecture
        run: cargo build --release
      - name: Build the release version of `rudof` for the aarch64 architecture
        run: cargo build --release --target aarch64-apple-darwin
      - name: Upload the generated Artifact for it to be stored in its corresponding release (x86)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.BINARY_NAME }}_x86_64_apple
          path: target/release/${{ vars.BINARY_NAME }}
      - name: Upload the generated Artifact for it to be stored in its corresponding release (aarch64)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.BINARY_NAME }}_aarch64_apple
          path: target/aarch64-apple-darwin/release/${{ vars.BINARY_NAME }}
      - name: Rename the binary according to the version and architecture
        run: mv target/release/${{ vars.BINARY_NAME }} ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64_apple
      - name: Rename the binary according to the version and architecture
        run: mv target/aarch64-apple-darwin/release/${{ vars.BINARY_NAME }} ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_aarch64_apple
      - name: Upload the generated binaries to their corresponding release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64_apple
            ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_aarch64_apple
      
      # Build and upload rudof-mcp binaries (for MCP registry)
      - name: Build rudof-mcp binary for x86_64 architecture
        run: cargo build --release -p rudof_mcp --bin rudof-mcp
      - name: Build rudof-mcp binary for aarch64 architecture
        run: cargo build --release -p rudof_mcp --bin rudof-mcp --target aarch64-apple-darwin
      - name: Create rudof-mcp directory for MCPB compliance
        run: mkdir -p rudof-mcp
      - name: Copy and rename rudof-mcp x86_64 binary
        run: cp target/release/rudof-mcp rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_apple
      - name: Copy and rename rudof-mcp aarch64 binary
        run: cp target/aarch64-apple-darwin/release/rudof-mcp rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_aarch64_apple
      - name: Generate SHA-256 hash for rudof-mcp x86_64 binary
        run: shasum -a 256 rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_apple > rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_apple.sha256
      - name: Generate SHA-256 hash for rudof-mcp aarch64 binary
        run: shasum -a 256 rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_aarch64_apple > rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_aarch64_apple.sha256
      - name: Upload rudof-mcp binaries and hashes to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_apple
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_apple.sha256
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_aarch64_apple
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_aarch64_apple.sha256

  windows:
    runs-on: windows-latest
    steps:
      - name: Allow the workflow to access the files of the repository
        uses: actions/checkout@v3
        with:
          submodules: true
      - name: Update Rustup
        run: rustup update
      - name: Install OpenSSL
        run: |
          Get-Command openssl
          openssl version
          dir "C:\Program Files\OpenSSL\lib"
          echo "OPENSSL_LIB_DIR=C:/Program Files/OpenSSL/lib" >> $env:GITHUB_ENV
          echo "OPENSSL_DIR=C:/Program Files/OpenSSL/" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:/Program Files/OpenSSL/include" >> $env:GITHUB_ENV
      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Use an intelligent Rust cache for building the project
        uses: Swatinem/rust-cache@v2
      - name: Remove the MySys64 libraries and utilities
        run: Remove-Item -LiteralPath "C:\msys64\" -Force -Recurse
      - name: Build the release version of `rudof` for the x86 architecture
        run: cargo build --release
      - name: Upload the generated Artifact for it to be stored in its corresponding release (x86)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ vars.BINARY_NAME }}_x86_64_windows_msvc
          path: target/release/${{ vars.BINARY_NAME }}.exe
      - name: Rename the binary according to the version and architecture
        run: mv target/release/${{ vars.BINARY_NAME }}.exe ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe
      - name: Upload the generated binary to its corresponding release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe
      
      # Build and upload rudof-mcp binary (for MCP registry)
      - name: Build rudof-mcp binary for x86_64 architecture
        run: cargo build --release -p rudof_mcp --bin rudof-mcp
      - name: Create rudof-mcp directory for MCPB compliance
        run: New-Item -ItemType Directory -Force -Path rudof-mcp
      - name: Copy and rename rudof-mcp binary
        run: Copy-Item target/release/rudof-mcp.exe rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe
      - name: Generate SHA-256 hash for rudof-mcp binary
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe").Hash.ToLower()
          "$hash  rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe" | Out-File -Encoding ASCII "rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe.sha256"
      - name: Upload rudof-mcp binary and hash to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe
            rudof-mcp/rudof-mcp_${{ github.event.release.tag_name }}_x86_64_windows_msvc.exe.sha256

  deb:
    runs-on: ubuntu-latest
    steps:
    - name: Allow the workflow to access the files of the repository
      uses: actions/checkout@v3
    - name: Install stable toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    - name: Install cargo deb
      run: cargo install cargo-deb
    - name: Build the .deb file using cargo deb
      run: cargo deb
    - name: Upload the .deb Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ vars.BINARY_NAME }}
        path: target/debian/*.deb
    - name: Rename the binary according to the version and architecture
      run: mv target/debian/*.deb ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_amd64.deb
    - name: Upload the generated binary to its corresponding release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_amd64.deb

  rpm:
    runs-on: ubuntu-latest
    steps:
    - name: Allow the workflow to access the files of the repository
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Install stable toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    - name: Use an intelligent Rust cache for building the project
      uses: Swatinem/rust-cache@v2
    - name: Install cargo-generate-rpm
      run: cargo install cargo-generate-rpm
    - name: Build the release version of `rudof`
      run: cargo build --release
    - name: Generate the .rpm package using cargo-generate-rpm
      run: cargo generate-rpm -p rudof_cli
    - name: Upload the .rpm Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ vars.BINARY_NAME }}_x86_64_rpm
        path: target/generate-rpm/*.rpm
    - name: Rename the RPM according to the version and architecture
      run: mv target/generate-rpm/*.rpm ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64.rpm
    - name: Upload the generated RPM to its corresponding release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ vars.BINARY_NAME }}_${{ github.event.release.tag_name }}_x86_64.rpm

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Allow the workflow to access the files of the repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile_rudof
          no-cache: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.BINARY_NAME }}:latest
