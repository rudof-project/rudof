# Sparse case: same supported ShEx schema, but generation is intentionally less dense.
# Expected: lower data density in the generated graph.

[generation]
entity_count = 20
seed = 20260421
entity_distribution = "Equal"
cardinality_strategy = "Minimum"
property_fill_probability = 0.35
ignore_min_cardinality = true
max_properties_per_instance = 1
property_selection_strategy = "Random"
property_count_variance = 0.7

[field_generators.default]
locale = "en"
quality = "Medium"

[output]
path = "target/conformance_cases/sparse_generation.ttl"
format = "Turtle"
compress = false
write_stats = true
parallel_writing = false
parallel_file_count = 0

[parallel]
worker_threads = 2
batch_size = 50
parallel_shapes = true
parallel_fields = true
