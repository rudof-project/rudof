# Baseline case: simple supported ShEx schema.
# Expected: high triple validity and low translation loss.

[generation]
entity_count = 20
seed = 20260420
entity_distribution = "Equal"
cardinality_strategy = "Maximum"

[field_generators.default]
locale = "en"
quality = "Medium"

[output]
path = "target/conformance_cases/baseline_validity.ttl"
format = "Turtle"
compress = false
write_stats = true
parallel_writing = false
parallel_file_count = 0

[parallel]
worker_threads = 2
batch_size = 50
parallel_shapes = true
parallel_fields = true
